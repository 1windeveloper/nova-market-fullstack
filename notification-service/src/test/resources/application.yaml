spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.amqp.autoconfigure.RabbitAutoConfiguration
  datasource:
    url: jdbc:h2:mem:notification_service_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop

app:
  notifications:
    exchange: market.notifications
    routing-key: orders.events
    queue: notification.events

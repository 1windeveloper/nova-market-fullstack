server:
  port: 8085

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      mvc:
        routes:
          - id: market-app-auth
            uri: ${MARKET_APP_URL:http://localhost:8080}
            predicates:
              - Path=/api/auth/**
          - id: market-app-catalog
            uri: ${MARKET_APP_URL:http://localhost:8080}
            predicates:
              - Path=/api/categories/**,/api/products/**,/api/admin/**
          - id: market-app-orders
            uri: ${MARKET_APP_URL:http://localhost:8080}
            predicates:
              - Path=/api/orders/**,/api/users/**
          - id: market-file-service
            uri: ${MARKET_FILE_SERVICE_URL:http://localhost:8081}
            predicates:
              - Path=/api/files/**
          - id: notification-service
            uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8082}
            predicates:
              - Path=/api/notifications/**

management:
  endpoints:
    web:
      exposure:
        include: health,info

services:
  postgres:
    image: postgres:16
    container_name: market-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: market_app
    ports:
      - "55432:5432"
    volumes:
      - market_postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: market-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - market_minio_data:/data

  redis:
    image: redis:7
    container_name: market-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: market-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  market_postgres_data:
  market_minio_data:

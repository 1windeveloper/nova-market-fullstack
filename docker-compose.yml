services:
  postgres:
    image: postgres:16
    container_name: nova-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: market_app
    ports:
      - "55433:5432"
    volumes:
      - nova_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d market_app"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: nova-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: nova-rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: nova-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - nova_minio_data:/data

  market-app:
    build:
      context: ./market-app
    container_name: nova-market-app
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/market_app
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      FILE_SERVICE_URL: http://api-gateway:8085
      CORS_ALLOWED_ORIGINS: http://localhost:5500,http://127.0.0.1:5500
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  market-file-service:
    build:
      context: ./market-file-service
    container_name: nova-market-file-service
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/market_app
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: market-files
      FILE_PUBLIC_URL: http://localhost:8085/api/files
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  notification-service:
    build:
      context: ./notification-service
    container_name: nova-notification-service
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/market_app
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  api-gateway:
    build:
      context: ./api-gateway
    container_name: nova-api-gateway
    environment:
      MARKET_APP_URL: http://market-app:8080
      MARKET_FILE_SERVICE_URL: http://market-file-service:8081
      NOTIFICATION_SERVICE_URL: http://notification-service:8082
    ports:
      - "8085:8085"
    depends_on:
      - market-app
      - market-file-service
      - notification-service

  frontend:
    build:
      context: ./frontend
    container_name: nova-frontend
    ports:
      - "5500:80"
    depends_on:
      - api-gateway

volumes:
  nova_postgres_data:
  nova_minio_data:

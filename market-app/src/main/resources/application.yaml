server:
  port: 8080

spring:
  application:
    name: market-app
  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:55432/market_app}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

app:
  file-service-url: ${FILE_SERVICE_URL:http://localhost:8081}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500,file://}

server:
  port: 8081

spring:
  application:
    name: market-file-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:55432/market_app}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:market-files}
  public-url: ${FILE_PUBLIC_URL:http://localhost:8081/api/files}
  create-bucket: ${MINIO_CREATE_BUCKET:true}
